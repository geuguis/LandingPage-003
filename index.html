-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12\"><\u002Fpath><\u002Fsvg>\n                        GitHub\n                    <\u002Fa>\n                    <a href=\"mailto:tu-email@dominio.com\" class=\"contact-link\">\n                        <svg viewBox=\"0 0 24 24\" aria-hidden=\"true\"><path d=\"M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L5.455 4.64 12 9.548l6.545-4.91 1.528-1.145C21.69 2.28 24 3.434 24 5.457z\"><\u002Fpath><\u002Fsvg>\n                        Email\n                    <\u002Fa>\n                <\u002Fdiv>\n            <\u002Fdiv>\n        <\u002Fsection>\n\n        <!-- ═══ FOOTER ═══════════════════════════════════ -->\n        <footer>\n            <div class=\"footer-brand\">José Luis<\u002Fdiv>\n            <div class=\"footer-suits\" aria-hidden=\"true\">♠ ♥ ♣ ♦<\u002Fdiv>\n            <div class=\"footer-copy\">Hecho con HTML y mucho Spring Boot · Arahal, Sevilla<\u002Fdiv>\n        <\u002Ffooter>\n\n    <\u002Fdiv>\n\n    <script>\n    // ═══════════════════════════════════════════════════\n    // [FIX P1 + P3] prefers-reduced-motion y pausa por visibilidad\n    // ═══════════════════════════════════════════════════\n    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    // ═══════════════════════════════════════════════════\n    // WebGL BACKGROUND\n    // ═══════════════════════════════════════════════════\n    const canvas = document.getElementById('bg-canvas');\n    const gl = canvas.getContext('webgl');\n\n    const vsSource = `\n        attribute vec2 position;\n        void main() { gl_Position = vec4(position, 0.0, 1.0); }\n    `;\n\n    const fsSource = `\n        precision highp float;\n        uniform vec2 iResolution;\n        uniform float iTime;\n        #define SPIN_ROTATION -2.0\n        #define SPIN_SPEED 7.0\n        #define OFFSET vec2(0.0, 0.0)\n        #define COLOUR_1 vec4(0.75, 0.1, 0.08, 1.0)\n        #define COLOUR_2 vec4(0.05, 0.12, 0.22, 1.0)\n        #define COLOUR_3 vec4(0.06, 0.04, 0.03, 1.0)\n        #define CONTRAST 4.0\n        #define LIGTHING 0.35\n        #define SPIN_AMOUNT 0.25\n        #define PIXEL_FILTER 900.0\n        #define SPIN_EASE 1.0\n\n        vec4 effect(vec2 screenSize, vec2 screen_coords) {\n            float pixel_size = length(screenSize.xy) / PIXEL_FILTER;\n            vec2 uv = (floor(screen_coords.xy * (1.0 / pixel_size)) * pixel_size - 0.5 * screenSize.xy) / length(screenSize.xy) - OFFSET;\n            float uv_len = length(uv);\n            float speed = (SPIN_ROTATION * SPIN_EASE * 0.2) + 302.2;\n            float new_pixel_angle = atan(uv.y, uv.x) + speed - SPIN_EASE * 20.0 * (SPIN_AMOUNT * uv_len + (1.0 - SPIN_AMOUNT));\n            vec2 mid = (screenSize.xy / length(screenSize.xy)) / 2.0;\n            uv = vec2(uv_len * cos(new_pixel_angle) + mid.x, uv_len * sin(new_pixel_angle) + mid.y) - mid;\n            uv *= 30.0;\n            float loop_speed = iTime * SPIN_SPEED;\n            vec2 uv2 = vec2(uv.x + uv.y, uv.x + uv.y);\n            for(int i = 0; i < 5; i++) {\n                uv2 += sin(max(uv.x, uv.y)) + uv;\n                uv  += 0.5 * vec2(cos(5.1123314 + 0.353 * uv2.y + loop_speed * 0.131121), sin(uv2.x - 0.113 * loop_speed));\n                uv  -= 1.0 * cos(uv.x + uv.y) - 1.0 * sin(uv.x * 0.711 - uv.y);\n            }\n            float contrast_mod = (0.25 * CONTRAST + 0.5 * SPIN_AMOUNT + 1.2);\n            float paint_res = min(2.0, max(0.0, length(uv) * (0.035) * contrast_mod));\n            float c1p = max(0.0, 1.0 - contrast_mod * abs(1.0 - paint_res));\n            float c2p = max(0.0, 1.0 - contrast_mod * abs(paint_res));\n            float c3p = 1.0 - min(1.0, c1p + c2p);\n            float light = (LIGTHING - 0.2) * max(c1p * 5.0 - 4.0, 0.0) + LIGTHING * max(c2p * 5.0 - 4.0, 0.0);\n            return (0.3 / CONTRAST) * COLOUR_1 + (1.0 - 0.3 / CONTRAST) * (COLOUR_1 * c1p + COLOUR_2 * c2p + vec4(c3p * COLOUR_3.rgb, c3p * COLOUR_1.a)) + light;\n        }\n\n        void main() { gl_FragColor = effect(iResolution, gl_FragCoord.xy); }\n    `;\n\n    function compileShader(type, source) {\n        const shader = gl.createShader(type);\n        gl.shaderSource(shader, source);\n        gl.compileShader(shader);\n        if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {\n            console.error(gl.getShaderInfoLog(shader));\n            return null;\n        }\n        return shader;\n    }\n\n    if (gl && !prefersReducedMotion) {\n        const program = gl.createProgram();\n        gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vsSource));\n        gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fsSource));\n        gl.linkProgram(program);\n        gl.useProgram(program);\n\n        const vertices = new Float32Array([-1,-1, 1,-1, -1,1, 1,1]);\n        const buf = gl.createBuffer();\n        gl.bindBuffer(gl.ARRAY_BUFFER, buf);\n        gl.bufferData(gl.ARRAY_BUFFER, vertices, gl.STATIC_DRAW);\n\n        const posLoc = gl.getAttribLocation(program, 'position');\n        gl.enableVertexAttribArray(posLoc);\n        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);\n\n        const uRes  = gl.getUniformLocation(program, 'iResolution');\n        const uTime = gl.getUniformLocation(program, 'iTime');\n\n        function resize() {\n            canvas.width  = window.innerWidth;\n            canvas.height = window.innerHeight;\n            gl.viewport(0, 0, canvas.width, canvas.height);\n        }\n        window.addEventListener('resize', resize);\n        resize();\n\n        let start = Date.now();\n        let animating = true;\n\n        // [FIX P3] Pausar WebGL cuando el tab no está visible — ahorra batería\n        document.addEventListener('visibilitychange', () => {\n            if (document.hidden) {\n                animating = false;\n            } else {\n                animating = true;\n                start = Date.now() - pausedAt; // mantener continuidad temporal\n                render();\n            }\n        });\n\n        let pausedAt = 0;\n        function render() {\n            if (!animating) {\n                pausedAt = Date.now() - start;\n                return;\n            }\n            gl.uniform2f(uRes, canvas.width, canvas.height);\n            gl.uniform1f(uTime, (Date.now() - start) / 1000.0);\n            gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);\n            requestAnimationFrame(render);\n        }\n\n        render();\n    } else {\n        // prefers-reduced-motion: ocultar canvas (el CSS ya lo hace, doble seguridad)\n        canvas.style.display = 'none';\n    }\n\n    // ═══════════════════════════════════════════════════\n    // [FIX P1] HAMBURGER NAV — toggle mobile\n    // ═══════════════════════════════════════════════════\n    const navToggle = document.getElementById('navToggle');\n    const navLinks  = document.getElementById('navLinks');\n\n    navToggle.addEventListener('click', () => {\n        const isOpen = navLinks.classList.toggle('open');\n        navToggle.setAttribute('aria-expanded', String(isOpen));\n        // Bloquear scroll del body cuando el menú está abierto\n        document.body.style.overflow = isOpen ? 'hidden' : '';\n    });\n\n    // Cerrar menú al hacer clic en cualquier enlace\n    navLinks.querySelectorAll('a').forEach(a => {\n        a.addEventListener('click', () => {\n            navLinks.classList.remove('open');\n            navToggle.setAttribute('aria-expanded', 'false');\n            document.body.style.overflow = '';\n        });\n    });\n\n    // Cerrar menú con Escape\n    document.addEventListener('keydown', e => {\n        if (e.key === 'Escape' && navLinks.classList.contains('open')) {\n            navLinks.classList.remove('open');\n            navToggle.setAttribute('aria-expanded', 'false');\n            document.body.style.overflow = '';\n            navToggle.focus();\n        }\n    });\n\n    // ═══════════════════════════════════════════════════\n    // FLOATING MUSIC NOTES — respeta reduced motion\n    // ═══════════════════════════════════════════════════\n    if (!prefersReducedMotion) {\n        const notes = ['♩','♪','♫','♬','𝄞','𝄢'];\n        const container = document.getElementById('notesContainer');\n        setInterval(() => {\n            const note = document.createElement('div');\n            note.className = 'note';\n            note.textContent = notes[Math.floor(Math.random() * notes.length)];\n            note.style.left = Math.random() * 100 + '%';\n            note.style.animationDuration = (6 + Math.random() * 6) + 's';\n            note.style.animationDelay = (Math.random() * 2) + 's';\n            note.style.fontSize = (1 + Math.random() * 2) + 'rem';\n            note.style.opacity = '0';\n            container.appendChild(note);\n            setTimeout(() => note.remove(), 14000);\n        }, 1200);\n    }\n\n    // ═══════════════════════════════════════════════════\n    // SCROLL REVEAL\n    // ═══════════════════════════════════════════════════\n    const revealObserver = new IntersectionObserver((entries) => {\n        entries.forEach(entry => {\n            if (entry.isIntersecting) entry.target.classList.add('visible');\n        });\n    }, { threshold: 0.1 });\n\n    document.querySelectorAll('.reveal, .timeline-item, .shop-card').forEach(el => {\n        revealObserver.observe(el);\n    });\n\n    // ═══════════════════════════════════════════════════\n    // BALATRO CARD MOTION — 3D tilt + spring bounce\n    // ═══════════════════════════════════════════════════\n    if (!prefersReducedMotion) {\n        const balatroCards = document.querySelectorAll('.balatro-hover');\n\n        balatroCards.forEach(card => {\n            let rafId = null;\n            let targetRX = 0, targetRY = 0, curRX = 0, curRY = 0;\n            let hovering = false;\n            let prevMouseX = 0;\n            let xSpeed = 0;\n\n            function loop() {\n                curRX += (targetRX - curRX) * 0.18;\n                curRY += (targetRY - curRY) * 0.18;\n                xSpeed *= 0.85;\n                const tilt = xSpeed * 0.08;\n                card.style.animationPlayState = hovering ? 'paused' : 'running';\n                if (hovering) {\n                    card.style.transform =\n                        `perspective(800px) translateY(-6px) ` +\n                        `rotateX(${curRX}deg) rotateY(${curRY + tilt}deg) ` +\n                        `rotateZ(${tilt * 0.4}deg) scale(1.05)`;\n                } else if (Math.abs(curRX) > 0.05 || Math.abs(curRY) > 0.05 || Math.abs(xSpeed) > 0.1) {\n                    card.style.transform =\n                        `perspective(800px) rotateX(${curRX}deg) rotateY(${curRY}deg) rotateZ(${tilt * 0.2}deg)`;\n                } else {\n                    card.style.transform = '';\n                }\n                rafId = requestAnimationFrame(loop);\n            }\n\n            card.addEventListener('mouseenter', () => { hovering = true; if (!rafId) loop(); });\n\n            card.addEventListener('mousemove', (e) => {\n                const rect = card.getBoundingClientRect();\n                const x = (e.clientX - rect.left) / rect.width - 0.5;\n                const y = (e.clientY - rect.top)  / rect.height - 0.5;\n                targetRY = x * 18;\n                targetRX = -y * 12;\n                xSpeed = e.clientX - prevMouseX;\n                prevMouseX = e.clientX;\n            });\n\n            card.addEventListener('mouseleave', () => {\n                hovering = false;\n                targetRX = 0;\n                targetRY = 0;\n                setTimeout(() => {\n                    if (rafId && !hovering) {\n                        cancelAnimationFrame(rafId);\n                        rafId = null;\n                        card.style.transform = '';\n                        card.style.animationPlayState = '';\n                    }\n                }, 600);\n            });\n\n            card.addEventListener('click', () => {\n                card.classList.remove('bounce');\n                void card.offsetWidth;\n                card.classList.add('bounce');\n                setTimeout(() => card.classList.remove('bounce'), 600);\n            });\n        });\n    }\n\n    // Reroll button\n    const rerollBtn = document.querySelector('.shop-reroll');\n    if (rerollBtn && !prefersReducedMotion) {\n        rerollBtn.addEventListener('click', () => {\n            document.querySelectorAll('.shop-card').forEach((c, i) => {\n                setTimeout(() => {\n                    c.classList.remove('bounce');\n                    void c.offsetWidth;\n                    c.classList.add('bounce');\n                    setTimeout(() => c.classList.remove('bounce'), 600);\n                }, i * 60);\n            });\n        });\n    }\n\n    // ═══════════════════════════════════════════════════\n    // CARD SPARKLE ON HERO BUTTONS\n    // ═══════════════════════════════════════════════════\n    if (!prefersReducedMotion) {\n        document.querySelectorAll('.btn-primary, .btn-secondary').forEach(btn => {\n            btn.addEventListener('click', function(e) {\n                const sparks = 8;\n                for (let i = 0; i < sparks; i++) {\n                    const spark = document.createElement('span');\n                    spark.style.cssText = `\n                        position:fixed;width:6px;height:6px;border-radius:50%;\n                        background:#f0c040;pointer-events:none;z-index:9999;\n                        left:${e.clientX}px;top:${e.clientY}px;\n                    `;\n                    document.body.appendChild(spark);\n                    const angle = (i / sparks) * Math.PI * 2;\n                    const dist = 40 + Math.random() * 40;\n                    spark.animate([\n                        { transform: 'translate(0,0) scale(1)', opacity: 1 },\n                        { transform: `translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) scale(0)`, opacity: 0 }\n                    ], { duration: 500, easing: 'ease-out' }).onfinish = () => spark.remove();\n                }\n            });\n        });\n    }\n\n    // Active nav link on scroll\n    const sections  = document.querySelectorAll('section[id]');\n    const navLinkEls = document.querySelectorAll('.nav-links a');\n    window.addEventListener('scroll', () => {\n        let current = '';\n        sections.forEach(s => { if (window.scrollY >= s.offsetTop - 200) current = s.id; });\n        navLinkEls.forEach(a => {\n            const active = a.getAttribute('href') === '#' + current;\n            a.style.opacity = active ? '1' : '0.7';\n            a.style.color   = active ? 'var(--gold)' : '';\n        });\n    });\n    <\u002Fscript>\n    <script src=\"2320384d-60ee-4b3e-85f4-18553717f83f\"><\u002Fscript>\n    <script src=\"e79a9c09-2df3-4b57-8f6e-7b83748d27fb\"><\u002Fscript>\n    <script>\n    /* Inyecta el anillo de bombillas en el cartel SHOP. Cada bombilla\n       recibe su propio animation-delay segun su posicion alrededor del\n       perimetro para crear el efecto chase. */\n    (function () {\n        const sign = document.querySelector('.shop-sign');\n        if (!sign) return;\n        if (sign.querySelector('.shop-sign-bulbs')) return;\n\n        const TOP = 8, BOTTOM = 8, SIDE = 2;\n        const wrap = document.createElement('div');\n        wrap.className = 'shop-sign-bulbs';\n\n        function makeStrip(cls, count) {\n            const s = document.createElement('div');\n            s.className = 'bulb-strip ' + cls;\n            for (let i = 0; i < count; i++) s.appendChild(document.createElement('i'));\n            return s;\n        }\n        const top    = makeStrip('top',    TOP);\n        const right  = makeStrip('right',  SIDE);\n        const bottom = makeStrip('bottom', BOTTOM);\n        const left   = makeStrip('left',   SIDE);\n\n        wrap.append(top, right, bottom, left);\n        sign.insertBefore(wrap, sign.firstChild);\n\n        // Asignar delays en orden perimetral: top L→R, right T→B,\n        // bottom R→L, left B→T. Total = TOP + SIDE + BOTTOM + SIDE bombillas.\n        const order = [\n            ...top.children,\n            ...right.children,\n            ...[...bottom.children].reverse(),\n            ...[...left.children].reverse()\n        ];\n        const cycle = 1.1; // debe coincidir con la duracion del @keyframes\n        order.forEach((bulb, i) => {\n            const delay = -(i / order.length) * cycle * 2; // *2 porque la animacion es alternate\n            bulb.style.animationDelay = delay.toFixed(3) + 's';\n        });\n    })();\n    <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
